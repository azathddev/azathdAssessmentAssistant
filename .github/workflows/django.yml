name: Django CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.13]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv sync
    - name: Setup project
      run: |
        cp config/.env.template config/.env
    - name: Run Database
      run: |
        docker compose up db --build -d
    - name: Making migrations
      run: |
        uv run python manage.py makemigrations
    - name: Apply migrations
      run: |
        uv run python manage.py migrate
    - name: Run Server
      run: |
        uv run python -We -bb manage.py runserver 0.0.0.0:8000 &

        # Ждём 5 секунд для старта сервера
        sleep 5

        # Проверяем доступность через curl
        curl --retry 5 --retry-delay 1 --retry-max-time 30 http://localhost:8000 || exit 1

        # Опционально: проверяем конкретный эндпоинт
        curl http://localhost:8000/health/ || exit 1

        # Останавливаем сервер (убиваем все процессы python)
        pkill -f "runserver" || true

    - name: Additional health check
      run: uv run python manage.py check --deploy
